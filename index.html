<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumah Kuning — 노란 집으로의 초대</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&family=Bebas Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #2a2520;
    --ink-mid:   #4a4540;
    --ink-soft:  #7a7268;
    --ink-faint: #b8b0a4;
    --sand:      #f7f3ec;
    --sand-mid:  #ede7da;
    --sand-dark: #d9cebd;
    --gold:      #e6b800;
    --gold-deep: #b88f00;
    --gold-pale: #f5e27a;
    --gold-wash: #fdf6d0;
    --white:     #fefcf8;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--sand);
    color: var(--ink);
    font-weight: 300;
    line-height: 1.8;
    overflow-x: hidden;
  }

  /* ── HERO ─────────────────────────────────── */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 8vw 10vh;
    background: url('https://images.unsplash.com/photo-1537953391147-f459c03281f9?auto=format&fit=crop&w=1800&q=85') center/cover no-repeat;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(30,24,18,0.15) 0%,
      rgba(30,24,18,0.05) 40%,
      rgba(30,24,18,0.65) 80%,
      rgba(20,16,10,0.85) 100%
    );
  }
  .hero-eyebrow {
    position: relative;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    font-size: clamp(0.7rem, 1.2vw, 0.85rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-pale);
    margin-bottom: 1.2rem;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.8s 0.3s ease forwards;
  }
  .hero-title {
    position: relative;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4.5rem, 14vw, 11rem);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--white);
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.9s 0.5s ease forwards;
  }
  .hero-title span {
    color: var(--gold);
    display: block;
  }
  .hero-subtitle {
    position: relative;
    margin-top: 1.6rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2.2vw, 1.35rem);
    font-style: italic;
    font-weight: 300;
    color: rgba(255,252,245,0.8);
    max-width: 420px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.8s 0.7s ease forwards;
  }
  .hero-scroll-hint {
    position: absolute;
    bottom: 3.5vh;
    right: 8vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 1.2s ease forwards;
  }
  .hero-scroll-hint span {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,252,245,0.45);
    writing-mode: vertical-rl;
  }
  .hero-scroll-hint::after {
    content: '';
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, rgba(255,252,245,0.35), transparent);
    animation: lineGrow 1.5s 1.5s ease forwards;
    transform-origin: top;
    transform: scaleY(0);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes lineGrow {
    to { transform: scaleY(1); }
  }

  /* ── LAYOUT ───────────────────────────────── */
  .wrap {
    max-width: 1160px;
    margin: 0 auto;
    padding: 0 5vw;
  }

  section { padding: 100px 0; }

  /* ── SECTION LABELS ──────────────────────── */
  .section-label {
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--gold-deep);
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    font-weight: 300;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 1.8rem;
  }
  .section-title em {
    font-style: italic;
    color: var(--ink-mid);
  }

  /* ── DIVIDER ─────────────────────────────── */
  .divider {
    width: 56px;
    height: 2px;
    background: var(--gold);
    margin-bottom: 2.5rem;
  }

  /* ── FLOOR PLAN ──────────────────────────── */
  .floorplan-section {
    background: var(--sand-mid);
    padding: 100px 0;
  }
  .floorplan-inner {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 80px;
    align-items: center;
  }
  .floorplan-desc p {
    font-size: 0.9rem;
    color: var(--ink-soft);
    line-height: 1.9;
    margin-bottom: 1rem;
  }
  .floorplan-box {
    background: var(--white);
    border-radius: 4px;
    padding: 32px;
    box-shadow: 0 2px 0 var(--gold), 0 20px 60px rgba(42,37,32,0.08);
  }

  /* ── ROOM SECTION ────────────────────────── */
  .room-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    margin-bottom: 80px;
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 24px 72px rgba(42,37,32,0.12);
  }
  .room-img {
    position: relative;
    overflow: hidden;
    height: 540px;
  }
  .room-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .room-grid:hover .room-img img { transform: scale(1.04); }
  .room-copy {
    background: var(--ink);
    color: var(--sand);
    padding: 64px 56px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .room-copy .section-label { color: var(--gold-pale); }
  .room-copy .section-label::before { background: var(--gold-pale); }
  .room-copy .section-title { color: var(--white); }
  .room-copy p {
    font-size: 0.88rem;
    color: rgba(237,231,218,0.7);
    line-height: 1.95;
    margin-bottom: 1.2rem;
  }
  .room-stat {
    display: flex;
    gap: 40px;
    margin-top: 2.5rem;
    padding-top: 2.5rem;
    border-top: 1px solid rgba(237,231,218,0.15);
  }
  .room-stat-item .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    line-height: 1;
    color: var(--gold);
  }
  .room-stat-item .lbl {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(237,231,218,0.45);
    margin-top: 4px;
  }

  /* ── COMMON SPACE ────────────────────────── */
  .common-section { background: var(--white); }
  .common-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-top: 3rem;
  }
  .common-card {
    background: var(--sand);
    padding: 44px 36px;
    position: relative;
    overflow: hidden;
    transition: background 0.3s ease;
    cursor: default;
  }
  .common-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .common-card:hover { background: var(--sand-mid); }
  .common-card:hover::after { transform: scaleX(1); }
  .common-card-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    line-height: 1;
    color: var(--sand-dark);
    margin-bottom: 1rem;
    transition: color 0.3s ease;
  }
  .common-card:hover .common-card-num { color: var(--gold-pale); }
  .common-card h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--ink);
    margin-bottom: 0.75rem;
  }
  .common-card p {
    font-size: 0.82rem;
    color: var(--ink-soft);
    line-height: 1.9;
  }

  /* ── SURF ────────────────────────────────── */
  .surf-section {
    background: var(--ink);
    padding: 100px 0;
  }
  .surf-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }
  .surf-left .section-label { color: var(--gold-pale); }
  .surf-left .section-label::before { background: var(--gold-pale); }
  .surf-left .section-title { color: var(--white); margin-bottom: 1.4rem; }
  .surf-left p {
    font-size: 0.88rem;
    color: rgba(237,231,218,0.55);
    line-height: 1.95;
    margin-bottom: 2.5rem;
  }

  .surf-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 14px 32px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
  }
  .surf-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    transform: translateX(-100%) skewX(-12deg);
    transition: transform 0.5s ease;
  }
  .surf-btn:hover {
    background: var(--gold-pale);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(230,184,0,0.3);
  }
  .surf-btn:hover::before { transform: translateX(200%) skewX(-12deg); }
  .surf-btn:active { transform: translateY(0); box-shadow: none; }
  .surf-btn svg { transition: transform 0.25s ease; }
  .surf-btn:hover svg { transform: rotate(45deg); }

  .surf-steps {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .surf-step {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 20px;
    padding: 28px 0;
    border-bottom: 1px solid rgba(237,231,218,0.08);
    align-items: start;
    opacity: 0;
    transform: translateX(20px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .surf-step.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .surf-step:first-child { padding-top: 0; }
  .surf-step-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--gold);
    line-height: 1;
    padding-top: 2px;
  }
  .surf-step h5 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 4px;
  }
  .surf-step p {
    font-size: 0.8rem;
    color: rgba(237,231,218,0.45);
    line-height: 1.8;
  }

  /* ── DOGS ────────────────────────────────── */
  .dogs-section { background: var(--sand-mid); }
  .dogs-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 24px;
    margin-top: 3rem;
  }
  .dog-card {
    background: var(--white);
    border-radius: 4px;
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.35s ease;
    cursor: default;
  }
  .dog-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 48px rgba(42,37,32,0.12);
  }
  .dog-photo {
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
  }
  .dog-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    filter: saturate(0.85);
  }
  .dog-card:hover .dog-photo img {
    transform: scale(1.06);
    filter: saturate(1);
  }
  .dog-info {
    padding: 24px 28px;
    border-top: 2px solid var(--gold);
  }
  .dog-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .dog-role {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ── FOOTER ──────────────────────────────── */
  footer {
    background: var(--ink);
    padding: 56px 5vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .footer-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.08em;
    color: var(--gold);
  }
  .footer-addr {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(237,231,218,0.35);
  }

  /* ── SCROLL REVEAL ───────────────────────── */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }

  /* ── RESPONSIVE ──────────────────────────── */
  @media (max-width: 840px) {
    .floorplan-inner { grid-template-columns: 1fr; }
    .room-grid { grid-template-columns: 1fr; }
    .room-img { height: 320px; }
    .common-grid { grid-template-columns: 1fr; }
    .surf-inner { grid-template-columns: 1fr; }
    .dogs-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 520px) {
    .dogs-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="hero">
  <p class="hero-eyebrow">Canggu, Bali &nbsp;·&nbsp; Guesthouse</p>
  <h1 class="hero-title">Rumah<span>Kuning</span></h1>
  <p class="hero-subtitle">모르는 이들과 함께, 노란 집에서 보내는 열두 개의 여름</p>
  <div class="hero-scroll-hint"><span>Scroll</span></div>
</header>

<section class="floorplan-section">
  <div class="wrap">
    <div class="floorplan-inner">
      <div>
        <p class="section-label reveal">House Layout</p>
        <h2 class="section-title reveal">집의<br><em>구조</em></h2>
        <div class="divider reveal"></div>
        <div class="reveal">
          <p style="font-size:0.88rem;color:var(--ink-soft);line-height:1.95;margin-bottom:1rem;">3개의 도미토리 룸과 열린 부엌, 마당의 긴 탁자, 그리고 발리의 하늘을 담은 루프탑으로 구성된 소담한 공간입니다.</p>
          <p style="font-size:0.88rem;color:var(--ink-soft);line-height:1.95;">총 12인을 위한 집으로 설계되어, 너무 크지도 작지도 않은 커뮤니티를 만들어냅니다.</p>
        </div>
        <div class="reveal" style="margin-top:2rem; display:flex; gap:10px;">
          <button id="fpTab1" onclick="fpSwitch(1)" style="
            padding:9px 22px; border-radius:2px; border:1.5px solid var(--ink);
            background:var(--ink); color:var(--gold-wash);
            font-family:'Noto Sans KR',sans-serif; font-size:0.78rem; font-weight:500;
            letter-spacing:0.12em; cursor:pointer; transition:all 0.2s ease;">1F</button>
          <button id="fpTab2" onclick="fpSwitch(2)" style="
            padding:9px 22px; border-radius:2px; border:1.5px solid var(--ink-soft);
            background:transparent; color:var(--ink-soft);
            font-family:'Noto Sans KR',sans-serif; font-size:0.78rem; font-weight:500;
            letter-spacing:0.12em; cursor:pointer; transition:all 0.2s ease;">2F</button>
        </div>
      </div>
      <div class="floorplan-box reveal">

        <div id="fp1">
        <svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
          <defs>
            <pattern id="dot2" width="18" height="18" patternUnits="userSpaceOnUse">
              <circle cx="1.5" cy="1.5" r="1" fill="#d9cebd"/>
            </pattern>
          </defs>

          <rect width="760" height="500" fill="#f0ebe0"/>
          <rect width="760" height="500" fill="url(#dot2)" opacity="0.45"/>

          <rect x="44" y="34" width="372" height="432" fill="#c4b99e" rx="3"/>
          <rect x="56" y="46" width="348" height="408" fill="#faf7f1" rx="1"/>

          <rect x="44" y="8" width="68" height="18" fill="#2a2520" rx="1"/>
          <text x="78" y="21" font-family="'Bebas Neue',sans-serif" font-size="10" letter-spacing="1.5" fill="#fdf6d0" text-anchor="middle">실내 · 1F</text>

          <rect x="64" y="54" width="182" height="126" fill="#fdf6d0" rx="1"/>
          <rect x="64" y="54" width="182" height="126" fill="none" stroke="#b88f00" stroke-width="1.5" rx="1"/>
          <text x="155" y="110" font-family="'Bebas Neue',sans-serif" font-size="13" letter-spacing="2" fill="#b88f00" text-anchor="middle">ROOM 01</text>
          <text x="155" y="126" font-family="'Noto Sans KR',sans-serif" font-size="9" fill="#d4a000" text-anchor="middle">4인
